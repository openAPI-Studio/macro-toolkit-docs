<!DOCTYPE html>
<html lang="en">
<head>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>

    html.light body{background:#F8FAFC;color:#0F172A}
    html.light .bg-surface{background-color:#FFFFFF!important}
    html.light .text-muted{color:#475569!important}
    html.light .text-text{color:#0F172A!important}

</head>
<body class="min-h-screen flex flex-col">

  <!-- Header -->
  <header class="px-4 sm:px-6 lg:px-8 py-8 max-w-4xl mx-auto w-full flex items-center justify-between">
    <a href="/" class="leading-tight">
      <span class="font-mono font-bold text-xl text-cta block">Vectored</span>
      <span class="text-xs text-muted">Tools for developers</span>
    </a>
    <button id="theme-toggle" class="p-2 rounded-lg hover:bg-surface transition-colors duration-200 cursor-pointer text-muted hover:text-text" aria-label="Toggle theme">
      <svg id="icon-dark" class="w-5 h-5" style="display:none" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
      <svg id="icon-light" class="w-5 h-5" style="display:none" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
    </button>
  </header>

  <main class="flex-1 flex items-center justify-center px-4 sm:px-6 lg:px-8 pb-20">
    <div class="text-center max-w-lg">
      <div id="scene" class="scene-svg mb-8"></div>
      <p class="font-mono text-6xl font-bold text-cta mb-4">404</p>
      <h1 class="text-2xl font-semibold mb-2" id="headline"></h1>
      <p class="text-muted mb-8" id="subtext"></p>
      <div class="flex flex-col sm:flex-row items-center justify-center gap-3">
        <a href="/" class="bg-cta text-bg font-semibold text-sm px-6 py-2.5 rounded-lg hover:bg-cta/90 transition-colors duration-200 cursor-pointer">Back to Home</a>
        <a href="/macrotoolkit/" class="border border-border text-muted hover:text-text text-sm px-6 py-2.5 rounded-lg hover:border-cta/40 transition-colors duration-200 cursor-pointer">Macro Toolkit</a>
        <a href="/forms/" class="border border-border text-muted hover:text-text text-sm px-6 py-2.5 rounded-lg hover:border-cta/40 transition-colors duration-200 cursor-pointer">Forms</a>
      </div>
    </div>
  </main>

  <footer class="border-t border-border px-4 sm:px-6 lg:px-8 py-6">
    <p class="text-center text-xs text-muted">&copy; 2026 Vectored. Built on Atlassian Forge.</p>
  </footer>

  <script>
  (function(){
    // Theme toggle
    var t=localStorage.getItem('theme');
    if(t==='light')document.documentElement.classList.add('light');
    else if(t==='dark')document.documentElement.classList.remove('light');
    else if(window.matchMedia('(prefers-color-scheme:light)').matches)document.documentElement.classList.add('light');
    function upd(){
      var isLight=document.documentElement.classList.contains('light');
      document.getElementById('icon-dark').style.display=isLight?'block':'none';
      document.getElementById('icon-light').style.display=isLight?'none':'block';
    }
    upd();
    document.getElementById('theme-toggle').addEventListener('click',function(e){e.stopPropagation();
      document.documentElement.classList.toggle('light');
      localStorage.setItem('theme',document.documentElement.classList.contains('light')?'light':'dark');
      upd();
    });

    // Random 404 themes
    var themes = [

        subtext: "This page drifted off into the void. Even our best resolvers couldn't find it.",

      },
      {
        headline: "Map not found",
        subtext: "We looked everywhere — under the sidebar, behind the footer, even in the manifest. Nothing.",
        svg: '<svg viewBox="0 0 320 240" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="80" y="50" width="160" height="140" rx="8" fill="#1E293B" stroke="#334155" stroke-width="2"/><path d="M80 80 L240 80" stroke="#334155" stroke-width="1"/><circle cx="100" cy="65" r="4" fill="#EF4444" opacity="0.7"/><circle cx="114" cy="65" r="4" fill="#EAB308" opacity="0.7"/><circle cx="128" cy="65" r="4" fill="#22C55E" opacity="0.7"/><text x="160" y="125" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#94A3B8">$ curl /this-page</text><text x="160" y="145" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#EF4444">404 Not Found</text><text x="160" y="165" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#94A3B8" opacity="0.5">$ _<animate attributeName="opacity" values="0.5;0;0.5" dur="1.2s" repeatCount="indefinite"/></text><path d="M50 220 Q160 200 270 220" stroke="#334155" stroke-width="1" fill="none"/></svg>'
      },
      {
        headline: "Wrong portal",

        svg: '<svg viewBox="0 0 320 240" fill="none" xmlns="http://www.w3.org/2000/svg"><ellipse cx="160" cy="120" rx="70" ry="90" fill="none" stroke="#22C55E" stroke-width="2" opacity="0.3"><animate attributeName="rx" values="70;75;70" dur="3s" repeatCount="indefinite"/><animate attributeName="ry" values="90;85;90" dur="3s" repeatCount="indefinite"/></ellipse><ellipse cx="160" cy="120" rx="50" ry="65" fill="none" stroke="#22C55E" stroke-width="1.5" opacity="0.5"><animate attributeName="rx" values="50;53;50" dur="2.5s" repeatCount="indefinite"/></ellipse><ellipse cx="160" cy="120" rx="30" ry="40" fill="#22C55E" opacity="0.05" stroke="#22C55E" stroke-width="1" opacity="0.7"/><circle cx="160" cy="120" r="8" fill="#22C55E" opacity="0.8"><animate attributeName="r" values="8;10;8" dur="2s" repeatCount="indefinite"/></circle><line x1="60" y1="40" x2="90" y2="70" stroke="#334155" stroke-width="1" opacity="0.4"/><line x1="260" y1="40" x2="230" y2="70" stroke="#334155" stroke-width="1" opacity="0.4"/><line x1="60" y1="200" x2="90" y2="170" stroke="#334155" stroke-width="1" opacity="0.4"/><line x1="260" y1="200" x2="230" y2="170" stroke="#334155" stroke-width="1" opacity="0.4"/><circle cx="55" cy="35" r="3" fill="#94A3B8" opacity="0.4"/><circle cx="265" cy="35" r="3" fill="#94A3B8" opacity="0.4"/><circle cx="55" cy="205" r="3" fill="#94A3B8" opacity="0.4"/><circle cx="265" cy="205" r="3" fill="#94A3B8" opacity="0.4"/></svg>'

        svg: '<svg viewBox="0 0 320 240" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="40" y="105" width="80" height="30" rx="4" fill="#1E293B" stroke="#22C55E" stroke-width="1.5"/><text x="80" y="124" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#22C55E">BUILD</text><rect x="200" y="105" width="80" height="30" rx="4" fill="#1E293B" stroke="#EF4444" stroke-width="1.5" stroke-dasharray="4 3"/><text x="240" y="124" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#EF4444">DEPLOY</text><line x1="120" y1="120" x2="155" y2="120" stroke="#22C55E" stroke-width="2"/><line x1="165" y1="120" x2="200" y2="120" stroke="#EF4444" stroke-width="2" stroke-dasharray="4 4"/><circle cx="160" cy="120" r="8" fill="#0F172A" stroke="#EAB308" stroke-width="2"/><text x="160" y="124" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#EAB308">!</text><path d="M160 140 L160 180" stroke="#334155" stroke-width="1" stroke-dasharray="3 3"/><text x="160" y="200" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#94A3B8">route_not_found</text><circle cx="60" cy="60" r="2" fill="#22C55E" opacity="0.3"/><circle cx="260" cy="60" r="2" fill="#EF4444" opacity="0.3"/><circle cx="160" cy="40" r="2" fill="#94A3B8" opacity="0.3"/></svg>'

        subtext: "We tried to resolve this page but got undefined. Maybe check the URL and try again?",
        svg: '<svg viewBox="0 0 320 240" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="60" y="40" width="200" height="160" rx="12" fill="#1E293B" stroke="#334155" stroke-width="2"/><rect x="80" y="70" width="160" height="12" rx="2" fill="#334155" opacity="0.5"/><rect x="80" y="92" width="120" height="12" rx="2" fill="#334155" opacity="0.3"/><rect x="80" y="114" width="140" height="12" rx="2" fill="#334155" opacity="0.4"/><rect x="80" y="136" width="100" height="12" rx="2" fill="#334155" opacity="0.2"/><rect x="80" y="158" width="130" height="12" rx="2" fill="#334155" opacity="0.3"/><line x1="70" y1="100" x2="250" y2="100" stroke="#EF4444" stroke-width="2" opacity="0.6"><animate attributeName="y1" values="70;160;70" dur="4s" repeatCount="indefinite"/><animate attributeName="y2" values="70;160;70" dur="4s" repeatCount="indefinite"/></line><text x="160" y="220" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" fill="#94A3B8" opacity="0.6">undefined</text></svg>'
      },
      {
        headline: "Caught in a loop",
        subtext: "This page redirected itself into oblivion. We broke the cycle to save your browser.",
        svg: '<svg viewBox="0 0 320 240" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="160" cy="120" r="60" fill="none" stroke="#334155" stroke-width="2" stroke-dasharray="8 4"><animateTransform attributeName="transform" type="rotate" from="0 160 120" to="360 160 120" dur="8s" repeatCount="indefinite"/></circle><circle cx="160" cy="120" r="40" fill="none" stroke="#22C55E" stroke-width="1.5" stroke-dasharray="6 6" opacity="0.6"><animateTransform attributeName="transform" type="rotate" from="360 160 120" to="0 160 120" dur="5s" repeatCount="indefinite"/></circle><circle cx="160" cy="120" r="20" fill="none" stroke="#EAB308" stroke-width="1" stroke-dasharray="4 4" opacity="0.5"><animateTransform attributeName="transform" type="rotate" from="0 160 120" to="360 160 120" dur="3s" repeatCount="indefinite"/></circle><circle cx="160" cy="120" r="4" fill="#EF4444"><animate attributeName="r" values="4;6;4" dur="1.5s" repeatCount="indefinite"/></circle><path d="M220 120 L230 115 L230 125 Z" fill="#334155"/><path d="M100 120 L90 115 L90 125 Z" fill="#22C55E" opacity="0.6"/></svg>'
      }
    ];

    var pick = themes[Math.floor(Math.random() * themes.length)];
    document.getElementById('scene').innerHTML = pick.svg;
    document.getElementById('headline').textContent = pick.headline;
    document.getElementById('subtext').textContent = pick.subtext;
  })();
  </script>
</body>
</html>
